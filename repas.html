<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c1b30">
<title>Cadence — Repas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito+Sans:wght@400;600;700&family=Space+Mono:wght@400;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --night-bg:#1c1b30;
    --night-card:#2B2A4A;
    --day-bg:#f4f1e9;
    --day-card:#ffffff;
    --gold:#D9A441;
    --gold-bright:#F4C969;
    --element-accent:#c94f3a;
    --coral:#c94f3a;
    --text-night:#f4f0e6;
    --text-day:#12283e;
    --transition-speed:.6s;

    --sheen: rgba(255,255,255,0.14);
    --sheen-day: rgba(255,255,255,0.55);
    --glass-border-night: rgba(255,255,255,0.10);
    --glass-border-day: rgba(255,255,255,0.65);
    --shadow-deep-night: 0 14px 30px -8px rgba(0,0,0,0.55), 0 3px 8px rgba(0,0,0,0.35);
    --shadow-deep-day: 0 14px 28px -10px rgba(20,30,60,0.22), 0 3px 8px rgba(20,30,60,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Nunito Sans', sans-serif;
    background:#0b0b14;
    min-height:100vh;
    min-height:100dvh;
  }
  .phone{
    width:100%; max-width:480px; height:100vh; height:100dvh; margin:0 auto; border-radius:0; overflow:hidden;
    position:relative; box-shadow:none;
    background:var(--night-bg); color:var(--text-night);
    transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
  }

  /* --- Desktop preview: restore phone-frame demo look above mobile widths --- */
  @media (min-width:481px){
    body{ display:flex; align-items:center; justify-content:center; padding:24px; }
    .phone{
      width:390px; height:780px; border-radius:44px; margin:0;
      box-shadow:0 30px 80px rgba(0,0,0,.55);
    }
  }
  .phone.day{ background:var(--day-bg); color:var(--text-day); }
  .scroll{ position:absolute; inset:0; overflow-y:auto; padding:20px 18px 100px 18px; }

  .topbar{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .wordmark{ font-family:'Quicksand'; font-weight:600; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-bright); opacity:.85; margin-bottom:2px; }
  .date-title{ font-family:'Quicksand'; font-weight:700; font-size:21px; }
  .toggle{
    background: linear-gradient(160deg, var(--sheen), rgba(255,255,255,0) 55%), rgba(128,128,128,.18);
    border:1px solid var(--glass-border-night); border-radius:20px; padding:7px 12px;
    font-family:'Nunito Sans'; font-size:12px; font-weight:700; cursor:pointer; color:inherit;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 4px 10px rgba(0,0,0,.25);
  }
  .phone.day .toggle{ border-color: var(--glass-border-day); box-shadow: inset 0 1px 0 rgba(255,255,255,.7), 0 4px 10px rgba(20,30,60,.12); }

  .section-label{
    font-family:'Nunito Sans'; font-size:11px; font-weight:700;
    letter-spacing:.05em; text-transform:uppercase; opacity:.6;
    margin:22px 0 10px 2px;
  }
  .section-label:first-of-type{ margin-top:0; }
  .section-hint{ font-weight:400; text-transform:none; opacity:.75; }

  .card{
    background: linear-gradient(160deg, var(--sheen) 0%, rgba(255,255,255,0) 50%), var(--night-card);
    border:1px solid var(--glass-border-night);
    border-radius:18px; padding:16px 17px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.10), var(--shadow-deep-night);
  }
  .phone.day .card{
    background: linear-gradient(160deg, var(--sheen-day) 0%, rgba(255,255,255,0) 55%), var(--day-card);
    border-color: var(--glass-border-day);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.8), var(--shadow-deep-day);
  }

  /* ---- Suggestion du jour ---- */
  .suggestion-card{ position:relative; overflow:hidden; }
  .suggestion-card::before{ content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--element-accent); }
  .suggestion-label{ font-family:'Nunito Sans'; font-size:10.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; opacity:.65; margin-left:6px; }
  .suggestion-titre{ font-family:'Quicksand'; font-weight:700; font-size:17px; margin:5px 0 6px 6px; }
  .suggestion-raison{ font-size:11.5px; opacity:.7; margin:0 0 10px 6px; line-height:1.4; }
  .suggestion-meta{ display:flex; gap:10px; margin-left:6px; font-size:11px; opacity:.65; }

  /* ---- Accordéon catégories ---- */
  .categorie{ margin-bottom:10px; }
  .categorie-header{
    display:flex; justify-content:space-between; align-items:center;
    width:100%; text-align:left; cursor:pointer; border:none;
    background: linear-gradient(160deg, var(--sheen) 0%, rgba(255,255,255,0) 50%), var(--night-card);
    border:1px solid var(--glass-border-night);
    border-radius:14px; padding:12px 14px; color:inherit;
    font-family:'Quicksand'; font-weight:700; font-size:14px;
  }
  .phone.day .categorie-header{
    background: linear-gradient(160deg, var(--sheen-day) 0%, rgba(255,255,255,0) 55%), var(--day-card);
    border-color: var(--glass-border-day);
  }
  .categorie-count{ font-family:'Nunito Sans'; font-weight:600; font-size:11px; opacity:.5; margin-left:8px; }
  .categorie-chevron{ font-size:13px; opacity:.5; transition: transform .2s ease; }
  .categorie.open .categorie-chevron{ transform: rotate(180deg); }
  .categorie-body{ display:none; flex-direction:column; gap:8px; margin-top:8px; }
  .categorie.open .categorie-body{ display:flex; }

  .recette-row{
    background: rgba(128,128,128,.10); border:1px solid var(--glass-border-night);
    border-radius:12px; padding:10px 12px;
  }
  .phone.day .recette-row{ border-color: var(--glass-border-day); background: rgba(0,0,0,.02); }
  .recette-nom{ font-family:'Nunito Sans'; font-weight:700; font-size:12.5px; margin-bottom:3px; }
  .recette-desc{ font-size:10.5px; opacity:.65; line-height:1.4; margin-bottom:5px; }
  .recette-ingredients{ font-size:10px; opacity:.55; line-height:1.5; }
  .recette-temps{ font-family:'Space Mono', monospace; font-size:10px; color:var(--gold-bright); float:right; }

  .bottom-nav{
    position:absolute; bottom:0; left:0; width:100%;
    display:flex; justify-content:space-around; align-items:center;
    padding:14px 10px 20px 10px;
    background: linear-gradient(0deg, var(--night-card) 0%, rgba(43,42,74,.92) 100%);
    border-top:1px solid rgba(255,255,255,.08);
    box-shadow: 0 -8px 20px rgba(0,0,0,.35);
    backdrop-filter: blur(12px);
  }
  .phone.day .bottom-nav{
    background: linear-gradient(0deg, var(--day-card) 0%, rgba(255,255,255,.92) 100%);
    border-top:1px solid rgba(0,0,0,.05);
    box-shadow: 0 -8px 20px rgba(20,30,60,.08);
  }
  .nav-item{ display:flex; flex-direction:column; align-items:center; gap:3px; font-size:9.5px; font-family:'Nunito Sans'; font-weight:700; opacity:.45; text-decoration:none; color:inherit; }
  .nav-item.active{ opacity:1; color:var(--gold-bright); }
  .nav-icon svg{ width:19px; height:19px; display:block; fill:currentColor; }

  .status-msg{ font-size:11px; opacity:.6; text-align:center; padding:20px 0; }
</style>
</head>
<body>

<div class="phone" id="phone">
  <div class="scroll">
    <div class="topbar">
      <div>
        <div class="wordmark">Cadence</div>
        <div class="date-title">Repas</div>
      </div>
      <button class="toggle" onclick="toggleDayNight()">🌙 / ☀️</button>
    </div>

    <div class="section-label">Suggestion du jour</div>
    <div class="card suggestion-card" id="suggestion-card">
      <span class="suggestion-label">Assemblage pur</span>
      <div class="suggestion-titre" id="suggestion-titre">Chargement…</div>
      <div class="suggestion-raison" id="suggestion-raison"></div>
      <div class="suggestion-meta" id="suggestion-meta"></div>
    </div>

    <div class="section-label">Toutes les recettes <span class="section-hint">(tape une catégorie)</span></div>
    <div id="categories-container">
      <div class="status-msg">Chargement des recettes…</div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="vue-du-jour.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 3.2 3 11h2v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9h2L12 3.2Z"/></svg></span>Jour</a>
    <a href="calendrier-unifie.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M7 2v2H5a2 2 0 0 0-2 2v2h18V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2H7Zm-4 8v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V10H3Zm4 3h3v3H7v-3Z"/></svg></span>Calendrier</a>
    <a href="repas.html" class="nav-item active"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 11a9 9 0 0 1 18 0v1H3v-1Zm-1 3h20l-1.4 5.6A2 2 0 0 1 18.66 21H5.34a2 2 0 0 1-1.94-1.4L2 14Z"/></svg></span>Repas</a>
    <a href="budget.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5Zm0 2.3 6.5 3.6L12 11.5 5.5 7.9 12 4.3ZM5 9.2l6 3.3v7L5 16.2V9.2Zm8 10.3v-7l6-3.3v7l-6 3.3Z"/></svg></span>Budget</a>
    <a href="reglages.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><g><rect x="10.7" y="0" width="2.6" height="4.2" rx="1"/><rect x="10.7" y="0" width="2.6" height="4.2" rx="1" transform="rotate(45 12 12)"/><rect x="10.7" y="0" width="2.6" height="4.2" rx="1" transform="rotate(90 12 12)"/><rect x="10.7" y="0" width="2.6" height="4.2" rx="1" transform="rotate(135 12 12)"/><rect x="10.7" y="0" width="2.6" height="4.2" rx="1" transform="rotate(180 12 12)"/><rect x="10.7" y="0" width="2.6" height="4.2" rx="1" transform="rotate(225 12 12)"/><rect x="10.7" y="0" width="2.6" height="4.2" rx="1" transform="rotate(270 12 12)"/><rect x="10.7" y="0" width="2.6" height="4.2" rx="1" transform="rotate(315 12 12)"/></g></svg></span>Réglages</a>
  </div>
</div>

<script>
  let isDay = false;
  function toggleDayNight(){
    isDay = !isDay;
    document.getElementById('phone').classList.toggle('day', isDay);
  }

  const SUPABASE_URL = "https://osqyczwawbbwjwaubtvc.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zcXljendhd2Jid2p3YXVidHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5Nzk1MjUsImV4cCI6MjA5NzU1NTUyNX0.Lk2iuL3v_AGuXbyG5yU_-cfvnOtmYoWxiYdyCVKxXzg";
  const FN_URL = `${SUPABASE_URL}/functions/v1/get-recettes`;

  const LABEL_CATEGORIE = { bowl:'Bowls', salade:'Salades', snack:'Snacks', snack_pre_regles:'Snacks pré-règles' };

  function renderRecette(r){
    const div = document.createElement('div');
    div.className = 'recette-row';
    div.innerHTML = `
      <span class="recette-temps">${r.temps_assemblage_minutes} min</span>
      <div class="recette-nom">${r.nom}</div>
      <div class="recette-desc">${r.description || ''}</div>
      <div class="recette-ingredients">${(r.ingredients || []).join(' · ')}</div>
    `;
    return div;
  }

  function toggleCategorie(id){
    document.getElementById(id).classList.toggle('open');
  }

  function renderSuggestion(suggestion){
    const titreEl = document.getElementById('suggestion-titre');
    const raisonEl = document.getElementById('suggestion-raison');
    const metaEl = document.getElementById('suggestion-meta');

    if (!suggestion){
      titreEl.textContent = "Pas encore de recette en base";
      raisonEl.textContent = '';
      metaEl.textContent = '';
      return;
    }

    titreEl.textContent = suggestion.recette.nom;
    raisonEl.textContent = suggestion.raison;
    metaEl.innerHTML = `<span>⏱ ${suggestion.recette.temps_assemblage_minutes} min</span><span>${suggestion.recette.sans_gluten ? '🌾 sans gluten' : ''}</span>`;
  }

  function renderCategories(parCategorie){
    const container = document.getElementById('categories-container');
    container.innerHTML = '';

    for (const [cle, label] of Object.entries(LABEL_CATEGORIE)){
      const recettes = parCategorie[cle] || [];
      if (recettes.length === 0) continue;

      const catId = `cat-${cle}`;
      const wrapper = document.createElement('div');
      wrapper.className = 'categorie';
      wrapper.id = catId;

      const header = document.createElement('button');
      header.className = 'categorie-header';
      header.onclick = () => toggleCategorie(catId);
      header.innerHTML = `<span>${label}<span class="categorie-count">${recettes.length}</span></span><span class="categorie-chevron">▾</span>`;
      wrapper.appendChild(header);

      const body = document.createElement('div');
      body.className = 'categorie-body';
      recettes.forEach(r => body.appendChild(renderRecette(r)));
      wrapper.appendChild(body);

      container.appendChild(wrapper);
    }
  }

  async function chargerRecettes(){
    try {
      const res = await fetch(FN_URL, { headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderSuggestion(data.suggestion_du_jour);
      renderCategories(data.recettes_par_categorie || {});
    } catch (err){
      console.error('Erreur de chargement des recettes :', err);
      document.getElementById('suggestion-titre').textContent = 'Impossible de charger les recettes';
      document.getElementById('categories-container').innerHTML = '<div class="status-msg">Recettes indisponibles pour le moment</div>';
    }
  }

  chargerRecettes();
</script>

</body>
</html>
